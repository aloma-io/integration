name: Publish to npm

on:
  push:
    tags:
      - '*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        working-directory: integration-sdk
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build
        working-directory: integration-sdk
        run: yarn run build

      - name: Publish (via fresh npm@latest for OIDC trusted publishing)
        working-directory: integration-sdk
        run: npx --yes --package=npm@latest -- npm publish --access public
